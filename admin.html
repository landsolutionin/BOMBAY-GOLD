<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <div id="admin-auth-screen">
        নেভিগেশন লক! অ্যাডমিন পাসওয়ার্ড দিন:
        <input type="password" id="admin-password" placeholder="পাসওয়ার্ড লিখুন (যেমন: 1234)" style="width:100%; padding:10px; margin:15px 0; border:1px solid #ccc; text-align:center;">
        <button id="btn-login" class="btn-publish">লগইন করুন</button>
    </div>

    <div id="admin-main-content" class="container">
        <header class="main-header">
            <h1 class="logo-text">BOMBAY GOLD - CONTROL PANEL</h1>
            <p class="bengali-notice">এডভান্সড সেটিংস এবং লাইভ রেজাল্ট ম্যানেজমেন্ট</p>
        </header>

        <div class="admin-box">
            <h2>Live Results & Time Customization</h2>
            <div class="form-group">
                <label>তারিখ সিলেক্ট করুন (Date):</label>
                <input type="date" id="result-date" required>
            </div>

            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th style="width: 40%;">Time Slot</th>
                            <th style="width: 30%;">৩ সংখ্যার পাত্তি (Patti)</th>
                            <th style="width: 30%;">১ সংখ্যার সিঙ্গেল (Single)</th>
                        </tr>
                    </thead>
                    <tbody id="admin-inputs-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="admin-box">
            <h2>Website Smart Settings & Customization</h2>
            <div class="form-group">
                <label>জরুরি লাল নোটিফিকেশন বার (ফাঁকা রাখলে মেইন পেজে হাইড থাকবে):</label>
                <input type="text" id="input-alert" placeholder="যেমন: আজকে উৎসবের জন্য বিকেল ৫ টার খেলা বন্ধ থাকবে।">
            </div>
            <div class="form-group">
                <label>ব্যাকগ্রাউন্ড ইমেজের অনলাইন লিঙ্ক (URL) (ফাঁকা রাখলে ডিফল্ট কালার থাকবে):</label>
                <input type="url" id="input-bg-url" placeholder="যেমন: https://site.com/bg-image.jpg">
            </div>
            <div class="form-group">
                <label>বাংলা সাবটাইটেল টেক্সট:</label>
                <input type="text" id="input-subtitle">
            </div>
            <div class="form-group">
                <label>চলন্ত লেখা (Marquee Text):</label>
                <input type="text" id="input-marquee">
            </div>
            <div class="form-group">
                <label>Tips Button URL:</label>
                <input type="url" id="input-tips-url">
            </div>
            <div class="form-group">
                <label>Patti Chart Button URL:</label>
                <input type="url" id="input-patti-url">
            </div>
        </div>

        <button type="button" id="btn-publish" class="btn-publish">PUBLISH LIVE</button>
        <div id="status-message" class="status-msg"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
