<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bombay Gold Admin Panel</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="admin-login" id="loginBox">

    <div class="login-card">

        <h2>Bombay Gold</h2>

        <p>Admin Login</p>

        <input
            type="password"
            id="adminPassword"
            placeholder="Enter Admin Password">

        <button id="loginBtn">
            Login
        </button>

        <p id="loginError" class="error"></p>

    </div>

</div>


<div class="admin-panel" id="adminPanel" style="display:none;">

<header class="admin-header">

<h1>Bombay Gold Admin Panel</h1>

<p>Live Result Management System</p>

</header>

<!-- =========================
     CONTROL PANEL
========================= -->

<div class="admin-content">

    <!-- DATE & LIVE -->

    <section class="admin-card">

        <h2>Today's Settings</h2>

        <div class="form-group">

            <label>Select Date</label>

            <input type="date" id="resultDate">

        </div>

        <div class="form-group">

            <label>LIVE Status</label>

            <select id="liveStatus">

                <option value="ON">LIVE ON</option>

                <option value="OFF">LIVE OFF</option>

            </select>

        </div>

    </section>


    <!-- TODAY RESULT 1 -->

    <section class="admin-card">

        <h2>Today's Result - 1</h2>

        <table class="admin-table">

            <tr>
                <th>Time</th>
                <th>Result</th>
            </tr>

            <tr>
                <td><input id="time1" value="10:20 AM"></td>
                <td><input id="result1"></td>
            </tr>

            <tr>
                <td><input id="time2" value="11:50 AM"></td>
                <td><input id="result2"></td>
            </tr>

            <tr>
                <td><input id="time3" value="01:20 PM"></td>
                <td><input id="result3"></td>
            </tr>

            <tr>
                <td><input id="time4" value="02:50 PM"></td>
                <td><input id="result4"></td>
            </tr>

        </table>

    </section>


    <!-- TODAY RESULT 2 -->

    <section class="admin-card">

        <h2>Today's Result - 2</h2>

        <table class="admin-table">

            <tr>
                <th>Time</th>
                <th>Result</th>
            </tr>

            <tr>
                <td><input id="time5" value="04:20 PM"></td>
                <td><input id="result5"></td>
            </tr>

            <tr>
                <td><input id="time6" value="05:50 PM"></td>
                <td><input id="result6"></td>
            </tr>

            <tr>
                <td><input id="time7" value="07:20 PM"></td>
                <td><input id="result7"></td>
            </tr>

            <tr>
                <td><input id="time8" value="08:50 PM"></td>
                <td><input id="result8"></td>
            </tr>

        </table>

    </section>
    
    <!-- NOTICE BOARD -->

    <section class="admin-card">

        <h2>Notice Board</h2>

        <textarea
            id="notice"
            rows="5"
            placeholder="এখানে Notice লিখুন..."></textarea>

    </section>


    <!-- WEBSITE SETTINGS -->

    <section class="admin-card">

        <h2>Website Settings</h2>

        <div class="form-group">

            <label>Logo Image URL</label>

            <input
                type="text"
                id="logoUrl"
                placeholder="https://example.com/logo.png">

        </div>

        <div class="form-group">

            <label>Background Image URL</label>

            <input
                type="text"
                id="backgroundUrl"
                placeholder="https://example.com/background.jpg">

        </div>

    </section>


    <!-- ACTION BUTTONS -->

    <section class="admin-card action-buttons">

        <button id="saveBtn">

            💾 Save All Changes

        </button>

        <button id="archiveBtn">

            📦 Archive Today Result

        </button>

        <button id="logoutBtn">

            🚪 Logout

        </button>

    </section>

</div>


</div>


<!-- Firebase -->

<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/admin.js"></script>

</body>

</html>
