<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#222;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
padding:15px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
font-size:18px;
}

button:hover{
opacity:.9;
}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h1>Admin Panel</h1>
<p>Manual Override System</p>
</div>

<!-- Result Inputs -->
<div class="card">
<h2>Result Update</h2>

<input id="mmc" placeholder="MMC Result">
<input id="ffl" placeholder="FFL Result">
<input id="mumbai" placeholder="Mumbai Result">

<button onclick="saveResult()">Save Result</button>
</div>

<!-- Manual Sports -->
<div class="card">
<h2>Manual Live Update</h2>

<input id="cricket" placeholder="Cricket Score">
<input id="football" placeholder="Football Score">
<input id="weather" placeholder="Weather Update">

<button onclick="saveManual()">Save Manual Data</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDS5w8TPFVLoy1i-RFJlRaCY_8LG9Xmpuw",
authDomain: "liveresultboard.firebaseapp.com",
databaseURL: "https://liveresultboard-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "liveresultboard",
storageBucket: "liveresultboard.firebasestorage.app",
messagingSenderId: "464276956164",
appId: "1:464276956164:web:68a0c1b7648e8d9f45c151"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveResult = function(){

const mmc = document.getElementById("mmc").value;
const ffl = document.getElementById("ffl").value;
const mumbai = document.getElementById("mumbai").value;

set(ref(db,"results"),{
mmc:mmc,
ffl:ffl,
mumbai:mumbai
});

alert("Result Updated Successfully");
}

window.saveManual = function(){

const cricket = document.getElementById("cricket").value;
const football = document.getElementById("football").value;
const weather = document.getElementById("weather").value;

set(ref(db,"manual"),{
cricket:cricket,
football:football,
weather:weather
});

alert("Manual Data Updated Successfully");
}

</script>

</body>
</html>
