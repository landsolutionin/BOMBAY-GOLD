<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Premium Play Zone</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --gold-primary: #fbbf24;
            --gold-hover: #f59e0b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); user-select: none; -webkit-user-select: none; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .play-container { width: 100%; max-width: 500px; background: var(--panel-dark); border-radius: 16px; border: 2px solid var(--gold-primary); box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; padding: 25px; position: relative; }
        h2 { text-align: center; color: var(--gold-primary); margin-bottom: 20px; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        p { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 13px; color: var(--gold-primary); margin-bottom: 6px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: var(--text-light); font-weight: bold; font-size: 16px; transition: all 0.3s; }
        input:focus, select:focus { border-color: var(--gold-primary); outline: none; box-shadow: 0 0 8px rgba(251, 191, 36, 0.3); }
        
        .btn-gold { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold-primary), var(--gold-hover)); border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; margin-top: 10px; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4); }
        
        /* Wallet Widget */
        .wallet-bar { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 12px 15px; border-radius: 8px; border-left: 4px solid var(--gold-primary); margin-bottom: 20px; }
        .wallet-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        .wallet-balance { font-size: 20px; color: var(--gold-primary); font-weight: bold; }

        /* Notification Toast */
        .toast { display: none; position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; font-weight: bold; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease; }
        .toast-success { background: var(--success); }
        .toast-error { background: var(--error); }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="toast" id="play-toast"></div>

    <div class="play-container">
        <div id="play-auth-screen">
            <h2>Player Verification</h2>
            <p>খেলার ইন্টারফেসে প্রবেশ করতে আপনার নাম ও পিন দিন:</p>
            <div class="form-group">
                <label>আপনার নাম (Full Name):</label>
                <input type="text" id="player-name" placeholder="আপনার নাম লিখুন">
            </div>
            <div class="form-group">
                <label>মোবাইলের শেষ ৪টি সংখ্যা (Security Pin):</label>
                <input type="text" id="player-pin" placeholder="যেমন: 5678" maxlength="4">
            </div>
            <button id="btn-request-otp" class="btn-gold">Request Access Code</button>

            <div id="otp-input-area" style="display: none; margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px;">
                <div class="form-group">
                    <label style="color: var(--success);">এডমিন থেকে প্রাপ্ত ৪ ডিজিট ওটিপি দিন:</label>
                    <input type="text" id="player-otp" placeholder="Enter 4-Digit OTP" maxlength="4" style="text-align: center; letter-spacing: 5px;">
                </div>
                <button id="btn-verify-login" class="btn-gold" style="background: linear-gradient(135deg, var(--success), #059669); color: white;">Verify & Enter Game</button>
            </div>
        </div>

        <div id="play-main-board" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span id="display-player-name" style="font-weight: bold; color: var(--gold-primary);">Welcome, Player</span>
                <button id="btn-player-logout" style="background: transparent; border: 1px solid var(--error); color: var(--error); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;">Exit</button>
            </div>

            <div class="wallet-bar">
                <div>
                    <div class="wallet-title">Current Points Balance</div>
                    <div id="player-wallet-display" class="wallet-balance">0.00 PTS</div>
                </div>
                <div style="font-size: 24px;">💰</div>
            </div>

            <h2>Place Your Bet</h2>
            
            <div class="form-group">
                <label>টাইম স্লট সিলেক্ট করুন (Select Draw Time):</label>
                <select id="play-slot-select">
                    </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px;">
                <div style="background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid #334155;">
                    <h4 style="color: var(--gold-primary); margin-bottom: 10px; font-size: 14px;">🎰 ১ সংখ্যার সিঙ্গেল (Single)</h4>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="play-single-num" placeholder="সংখ্যা (0-9)" maxlength="1" style="text-align: center;">
                        <input type="number" id="play-single-points" placeholder="পয়েন্ট / টাকা" min="10">
                    </div>
                </div>

                <div style="background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid #334155;">
                    <h4 style="color: var(--gold-primary); margin-bottom: 10px; font-size: 14px;">🃏 ৩ সংখ্যার পাত্তি (Patti)</h4>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="play-patti-num" placeholder="পাত্তি (e.g. 123)" maxlength="3" style="text-align: center;">
                        <input type="number" id="play-patti-points" placeholder="পয়েন্ট / টাকা" min="10">
                    </div>
                </div>
            </div>

            <button id="btn-submit-bet" class="btn-gold" style="margin-top: 20px;">Lock & Submit Bet</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        // সিকিউরিটি শিল্ড: রাইট-ক্লিক এবং ইনস্পেক্ট এলিমেন্ট পুরোপুরি লক
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
</body>
</html>
