<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY-GOLD Live Result</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🏆 BOMBAY-GOLD</div>
        <h1>Welcome to BOMBAY-GOLD</h1>
    </header>

    <main>
        <h2 id="result-date">Loading date...</h2>
        <p class="notice">লাইভ গেম রেজাল্ট সব থেকে প্রথম পাওয়ার জন্য ভিজিট করুন এই সাইট এ।</p>

        <div class="buttons">
            <button>Tips</button>
            <button>Patti Chart</button>
        </div>

        <section id="result-section">
            <div class="live-header">
                <span id="live-indicator" class="blink">● LIVE</span>
                <h3 id="result-title">Today's Live Game Results</h3>
            </div>
            
            <div id="game-results-container">
                </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
