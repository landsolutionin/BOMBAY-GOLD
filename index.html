<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <!-- SEO -->
    <meta name="description"
          content="Live Game Result Website">
    <meta name="keywords"
          content="Live Result, Game Result, Platinum">
    <meta name="author"
          content="Admin">
    <!-- Dynamic Title -->
    <title id="pageTitle">
        Loading...
    </title>
    <!-- Favicon -->
    <link id="favicon"
          rel="icon"
          href="assets/icons/favicon.png">
    <!-- CSS -->
    <link rel="stylesheet"
          href="css/style.css">
</head>
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-container">
                <select id="oldResult">
                    <option value="">
                        Old Result
                    </option>
                </select>
                <h2 id="mainHeading">
                    Loading...
                </h2>
                <p id="todayDate">
                    Loading Date...
                </p>
            </div>
        </section>
        <!-- Notice -->
        <section class="notice-section">
            <div class="notice-box">
                <p id="noticeText">
                    Loading Notice...
                </p>
            </div>
        </section>
        <!-- Live Result -->
        <section class="live-result">
            <h3 id="liveTitle">
                Today's Live Game Results
            </h3>
            <div id="liveResultContainer">
                <!-- Dynamic Result -->
            </div>
        </section>
        <!-- All Result -->
        <section class="all-result">
            <h3 id="allResultTitle">
                Game Results
            </h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Morning</th>
                            <th>Day</th>
                            <th>Night</th>
                        </tr>
                    </thead>
                    <tbody id="resultTable">
                        <!-- Dynamic Data -->
                    </tbody>
                </table>
            </div>
        </section>
<body>
    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-box">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>
    <!-- Website -->
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="logo-area">
                <img
                    id="siteLogo"
                    src="assets/images/logo.png"
                    alt="Logo">
                <h1 id="siteName">
                    Loading...
                </h1>
                <p id="welcomeText">
                    Welcome
                </p>
            </div>
        </header>
                <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p id="footerText">
                    Loading...
                </p>
            </div>
        </footer>
    </div>
    <!-- End App -->
    <!-- Toast Notification -->
    <div id="toastContainer"></div>
    <!-- Global Modal -->
    <div id="globalModal" class="modal">
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    <!-- Scroll To Top -->
    <button id="scrollTopBtn"
            title="Go to Top">
        ↑
    </button>

    <!-- JavaScript -->
    <script src="js/firebase.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/sports.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
