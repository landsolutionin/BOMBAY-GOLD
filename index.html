<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Result Board Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:linear-gradient(135deg,#8b0000,#ff4500);
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:38px;
}

.live-box{
background:white;
color:black;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.result-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.result-card{
background:white;
color:black;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.result-card h3{
font-size:24px;
margin-bottom:10px;
}

.result-number{
font-size:35px;
font-weight:bold;
color:red;
}

.timer{
font-size:22px;
margin-top:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:black;
color:white;
font-size:16px;
margin:5px;
}

input{
padding:12px;
width:100%;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

table{
width:100%;
background:white;
color:black;
border-radius:15px;
overflow:hidden;
margin-top:20px;
}

th,td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:black;
color:white;
}

.admin-panel{
background:white;
color:black;
padding:20px;
border-radius:15px;
margin-top:30px;
}

@media(max-width:768px){
.header h1{
font-size:28px;
}
.result-number{
font-size:28px;
}
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🔥 LIVE RESULT BOARD 🔥</h1>
</div>

<div class="live-box">
<h2>Today Live Result</h2>
<p>Auto Update Every 10 Seconds</p>
<div class="timer" id="timer">Next Update In: 10s</div>
<br>
<button onclick="updateResults()">Refresh Result</button>
</div>

<div class="result-grid">

<div class="result-card">
<h3>CMM</h3>
<div class="result-number" id="cmm">000-0</div>
</div>

<div class="result-card">
<h3>LFF</h3>
<div class="result-number" id="lff">000-0</div>
</div>

<div class="result-card">
<h3>Mumbai Bazar</h3>
<div class="result-number" id="mumbai">000-0</div>
</div>

</div>

<div class="live-box">
<h2>Result History</h2>

<table>
<thead>
<tr>
<th>Serial</th>
<th>Time</th>
<th>Game</th>
<th>Result</th>
</tr>
</thead>

<tbody id="historyTable">
</tbody>
</table>
</div>

<div class="admin-panel">
<h2>Admin Panel</h2>

<input type="password" id="adminPass" placeholder="Admin Password">

<input type="text" id="newCmm" placeholder="New CMM Result">
<input type="text" id="newLff" placeholder="New LFF Result">
<input type="text" id="newMumbai" placeholder="New Mumbai Result">

<button onclick="saveResults()">Save Result</button>
</div>

</div>

<script>

let count = 10;
let historyCount = 1;

function loadSavedResults(){

let cmm = localStorage.getItem("cmm") || "367-6";
let lff = localStorage.getItem("lff") || "221-4";
let mumbai = localStorage.getItem("mumbai") || "450-9";

document.getElementById("cmm").innerText = cmm;
document.getElementById("lff").innerText = lff;
document.getElementById("mumbai").innerText = mumbai;
}

function updateResults(){

let cmm = document.getElementById("cmm").innerText;
let lff = document.getElementById("lff").innerText;
let mumbai = document.getElementById("mumbai").innerText;

let time = new Date().toLocaleTimeString();

addHistory("CMM", cmm, time);
addHistory("LFF", lff, time);
addHistory("Mumbai", mumbai, time);

count = 10;
}

function addHistory(game,result,time){

let table = document.getElementById("historyTable");

let row = `
<tr>
<td>${historyCount++}</td>
<td>${time}</td>
<td>${game}</td>
<td>${result}</td>
</tr>
`;

table.innerHTML = row + table.innerHTML;
}

function saveResults(){

let pass = document.getElementById("adminPass").value;

if(pass !== "admin123"){
alert("Wrong Password");
return;
}

let cmm = document.getElementById("newCmm").value;
let lff = document.getElementById("newLff").value;
let mumbai = document.getElementById("newMumbai").value;

if(cmm){
document.getElementById("cmm").innerText = cmm;
localStorage.setItem("cmm", cmm);
}

if(lff){
document.getElementById("lff").innerText = lff;
localStorage.setItem("lff", lff);
}

if(mumbai){
document.getElementById("mumbai").innerText = mumbai;
localStorage.setItem("mumbai", mumbai);
}

alert("Result Updated Successfully");
}

setInterval(function(){

count--;

document.getElementById("timer").innerText =
"Next Update In: " + count + "s";

if(count <= 0){
updateResults();
}

},1000);

loadSavedResults();

</script>

</body>
</html>
