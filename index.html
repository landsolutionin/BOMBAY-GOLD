<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BOMBAY GOLD</title>
    <style>
        body { margin: 0; background-color: #0b0d17; color: #fff; font-family: sans-serif; }
        
        /* ১. হেডার হিরো সেকশন */
        .hero { text-align: center; padding: 20px; border-bottom: 2px solid #d7b15c; }
        .hero h1 { color: #d7b15c; margin: 0; font-size: 28px; }
        
        /* ২. রানিং স্ক্রল সেকশন */
        .marquee-box { background: #1f5aa8; color: white; padding: 8px; font-weight: bold; font-size: 14px; }
        
        /* ৩. মেনু (Tips & Patti) */
        .nav-menu { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .nav-btn { background: #d7b15c; color: #000; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* ৪. লাইভ রেজাল্ট সেকশন (সার্কেল বক্স) */
        .result-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .circle-box { width: 80px; height: 80px; border: 2px solid #d7b15c; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { border-color: #d7b15c; } 50% { border-color: #fff; } }
    </style>
</head>
<body>

    <div class="hero">
        <h1>BOMBAY GOLD</h1>
    </div>

    <div class="marquee-box">
        <marquee>আজকের লাইভ রেজাল্ট আপডেট চলছে...</marquee>
    </div>

    <div class="nav-menu">
        <div class="nav-btn">Tips</div>
        <div class="nav-btn">Patti Chart</div>
    </div>

    <div class="result-container" id="live-data">
        </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABwusy3oZXqh3531oJlQorBsUMWxQF08I",
            databaseURL: "https://live-result-b9155-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "live-result-b9155"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // অটো-আপডেট ফাংশন
        db.ref('results').on('value', snapshot => {
            const data = snapshot.val();
            const container = document.getElementById('live-data');
            container.innerHTML = '';
            for(let key in data) {
                container.innerHTML += `<div class="circle-box"><div>${key}</div><b style="font-size:20px">${data[key]}</b></div>`;
            }
        });
    </script>
</body>
</html>
