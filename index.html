<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description" content="Live Game Result Website">
    <meta name="keywords" content="Live Result, Result, Platinum">
    <meta name="author" content="Admin">

    <!-- Dynamic Title -->
    <title id="pageTitle">Loading...</title>

    <!-- Favicon -->
    <link id="favicon" rel="icon" href="assets/icons/favicon.png">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Loading Screen -->
    <div id="loader">

        <div class="loader-box">

            <div class="spinner"></div>

            <p>Loading...</p>

        </div>

    </div>

    <!-- Website Start -->
    <div id="app">

        <!-- Header -->
        <header class="header">

            <div class="logo-area">

                <img id="siteLogo"
                     src="assets/images/logo.png"
                     alt="Website Logo">

                <h1 id="siteName">Loading...</h1>

                <p id="welcomeText">
                    Welcome
                </p>

            </div>

        </header>

        <!-- Hero Section -->
        <section class="hero">

            <div class="hero-container">

                <select id="oldResult">

                    <option value="">
                        Old Result
                    </option>

                </select>

                <h2 id="mainHeading">
                    Loading...
                </h2>

                <p id="todayDate">
                    Loading Date...
                </p>

            </div>

        </section>

        <!-- Notice Section -->
        <section class="notice-section">

            <div class="notice-box">

                <p id="noticeText">
                    Loading Notice...
                </p>

            </div>

        </section>

        <!-- Live Result Section -->
        <section class="live-result">

            <h2 id="liveTitle">
                Today's Live Game Results
            </h2>

            <div id="liveResultContainer">

                <!-- Dynamic Live Result -->

            </div>

        </section>

        <!-- All Results Section -->
        <section class="all-result">

            <h2 id="allResultTitle">
                Game Results
            </h2>

            <div class="table-wrapper">

                <table>

                    <thead>

                        <tr>

                            <th>Date</th>
                            <th>Morning</th>
                            <th>Day</th>
                            <th>Night</th>

                        </tr>

                    </thead>

                    <tbody id="resultTable">

                        <!-- Dynamic Result Data -->

                    </tbody>

                </table>

            </div>

        </section>

        <!-- Advertisement Section -->
        <section id="advertisement">

            <!-- Dynamic Ads -->

        </section>

        <!-- Contact Section -->
        <section id="contactSection">

            <!-- Dynamic Contact Information -->

        </section>

        <!-- Footer -->
        <footer class="footer">

            <div class="footer-content">

                <p id="footerText">
                    Loading...
                </p>

            </div>

        </footer>

    </div>
    <!-- Website End -->

    <!-- Toast Notification -->
    <div id="toastContainer"></div>

    <!-- Global Modal -->
    <div id="globalModal" class="modal">

        <div class="modal-content">

            <button id="closeModal" type="button">&times;</button>

            <div id="modalBody"></div>

        </div>

    </div>

    <!-- Scroll To Top -->
    <button id="scrollTopBtn" type="button" aria-label="Scroll to Top">
        ↑
    </button>

    <!-- JavaScript Files -->
    <script src="js/firebase.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/sports.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
