<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Live Game Results</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    
    <div class="container main-glass-panel">
        
        <div id="custom-alert-bar" class="custom-alert-bar"></div>

        <div class="main-header-banner">
            <div id="live-indicator" class="live-badge" style="position: absolute; top: 15px; right: 15px; margin: 0;">• LIVE</div>

            <div class="logo-wrapper">
                <img src="https://img.icons8.com/fluent/96/gold-bars.png" alt="Logo" class="rotating-ai-logo">
            </div>
            
            <h1 class="premium-animated-title">BOMBAY GOLD</h1>
            <p class="premium-subtitle" id="site-subtitle">লাইভ গেম রেজাল্ট সবথেকে প্রথম পাওয়ার জন্য ভিজিট করুন...</p>
            
            <div class="marquee-wrapper">
                <marquee id="site-marquee" scrollamount="5" style="margin: 0; padding: 0; vertical-align: middle;">আজকের লাইভ আপডেট এর জন্য অপেক্ষা করুন...</marquee>
            </div>
        </div>

        <div class="nav-buttons">
            <a href="#" id="link-tips" class="btn btn-tips" target="_blank">Tips</a>
            <a href="#" id="link-patti" class="btn btn-patti" target="_blank">Patti Chart</a>
        </div>

        <div id="main-results-wrap">
            <div class="section-title">
                <h2>Today's Live Game Results</h2>
                <h3>Game Results in All West Bengal</h3>
            </div>

            <div id="results-container">
                <div class="loading-text">ফলাফল লোড হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন।</div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
